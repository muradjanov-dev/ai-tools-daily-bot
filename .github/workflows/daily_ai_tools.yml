name: 🤖 Daily AI Tools & News - Uzbek

on:
  schedule:
    # Ertalab 09:00 Toshkent (UTC+5 = 04:00 UTC) — AI YANGILIKLAR
    - cron: '0 4 * * *'
    # Kechqurun 19:00 Toshkent (UTC+5 = 14:00 UTC) — AI TOOLS
    - cron: '0 14 * * *'

  # Qo'lda ishga tushirish uchun
  workflow_dispatch:
    inputs:
      mode:
        description: 'Qaysi xabar yuborilsin?'
        required: true
        default: 'both'
        type: choice
        options:
          - 'both'
          - 'tools'
          - 'news'

jobs:
  send-message:
    name: 📢 Xabar yuborish
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Kodni yuklab olish
        uses: actions/checkout@v4

      - name: 🐍 Python sozlash
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Kutubxonalarni o'rnatish
        run: |
          pip install -r requirements.txt

      - name: 🎯 MODE ni aniqlash
        id: detect_mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 4 * * *" ]; then
            echo "mode=news" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 14 * * *" ]; then
            echo "mode=tools" >> $GITHUB_OUTPUT
          else
            echo "mode=both" >> $GITHUB_OUTPUT
          fi

      - name: 🤖 Botni ishlatish (${{ steps.detect_mode.outputs.mode }})
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MODE: ${{ steps.detect_mode.outputs.mode }}
        run: |
          cd scripts
          python -u ai_tools_bot.py 2>&1 | tee /tmp/bot_log.txt

      - name: 📋 Log yuklab olish (har doim)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: /tmp/bot_log.txt
          retention-days: 7

      - name: ✅ Muvaffaqiyat xabari
        if: success()
        run: |
          echo "🎉 AI Tools muvaffaqiyatli yuborildi!"
          echo "📅 Sana: $(date '+%Y-%m-%d %H:%M UTC')"

      - name: ❌ Xato xabari
        if: failure()
        run: |
          echo "❌ Bot ishda xato yuz berdi!"
          echo "📅 Sana: $(date '+%Y-%m-%d %H:%M UTC')"
